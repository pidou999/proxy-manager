version: '3.8'

services:
  proxy-manager:
    build: .
    container_name: proxy-manager
    restart: unless-stopped
    # host 网络：让 sing-box 直接监听主机 0.0.0.0:1080/1081
    # 局域网其他设备能直接连接到代理端口
    network_mode: host
    volumes:
      # 持久化数据（数据库）
      - ./data:/app/data
      # 引擎目录（sing-box 二进制 + 配置 + 日志）
      - ./bin:/app/bin
    environment:
      - TZ=Asia/Shanghai
    # 容器内端口（host 模式下不生效，留作参考）
    ports:
      - "5003:5003"
      - "1080:1080"
      - "1081:1081"